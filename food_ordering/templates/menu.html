{% extends "base.html" %}
{% block content %}

<h2>🍽️ {{ res }}</h2>

<form method="get">
    <input name="search" placeholder="🔍 Search food">
    <button class="btn">Search</button>
</form>
<br>

<div class="grid">

{% for item in items %}
<div class="card">

    <!-- 🍔 IMAGE -->
    <img src="{% if 'burger' in item.name|lower %}
              https://images.unsplash.com/photo-1550547660-d9450f859349
             {% elif 'pizza' in item.name|lower %}
                https://source.unsplash.com/300x200/?pizza
             {% elif 'salad' in item.name|lower %}
                https://source.unsplash.com/300x200/?salad
             {% elif 'ice' in item.name|lower %}
                https://source.unsplash.com/300x200/?ice-cream
             {% elif 'juice' in item.name|lower %}
                https://source.unsplash.com/300x200/?juice
             {% elif 'cake' in item.name|lower %}
                https://source.unsplash.com/300x200/?cake
             {% elif 'chicken' in item.name|lower %}
                https://source.unsplash.com/300x200/?chicken
             {% elif 'sushi' in item.name|lower %}
                https://source.unsplash.com/300x200/?sushi
             {% elif 'steak' in item.name|lower %}
                https://source.unsplash.com/300x200/?steak
             {% else %}
                https://source.unsplash.com/300x200/?food
             {% endif %}"
         width="100%" height="180"
         style="object-fit:cover; border-radius:12px;">

    <h3>{{ item.name }}</h3>

    <p>🍴 {{ item.category }}</p>

    <p>💰 ₹{{ item.price }}</p>

    <a href="/add/{{item.id}}" class="btn">➕ Add</a>

</div>
{% endfor %}

</div>

{% endblock %}
